<!DOCTYPE html>
<html>

<head>
    <title>Creating effects with CSS</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>
<!--NAVBAR-->
<nav class="nav-bar">
    <ul>
        <li>
            <a href="#">Home</a>
        </li>
        <li class="drop">
            <a href="#">Images</a>
            <div class="rollover-menu">
                <a href="#image 1">Image 1</a>
                <a href="#image 2">Image 2</a>
                <a href="#image 3">Image 3</a>
            </div>
        </li>
    </ul>
</nav>
<!--IMAGES-->
<section>
    <!--IMAGE ONE-->
    <div class="image-container" id="image 1">
        <div class="overlay"></div>
        <img src="images/Beach.jpg"
            alt="Sandy shoreline with gentle waves lapping a turquoise sea beneath a clear blue sky, conveying a calm and peaceful beach scene">
    </div>


    <!--IMAGE TWO-->
    <div class="image-container" id="image 2">
        <img src="images/Forest.jpg" class="zoom"
            alt="Dense green forest with sunlight filtering through the tree canopy, suggesting a tranquil and refreshing woodland atmosphere">
    </div>


    <!--IMAGE THREE-->
    <div class="image-container" id="image 3">
        <div class="circle">
            <img src="images/Sky.jpg"
                alt="Bright sun shining over a wide blue sky filled with fluffy white clouds above a turquoise ocean and pale sandy beach, evoking a serene and uplifting coastal scene">
        </div>
    </div>
</section>
<!--FOOTER -->
<footer>
    <div class="footer-text">
        <p>The Tech Academy &copy;</p>
    </div>
</footer>

</html>
